name: Deploy to server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-server
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GO_VERSION: "1.26.2"
      HUGO_VERSION: "0.160.0"
      PYTHON_VERSION: "3.13"
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Hugo
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify toolchain
        run: |
          python --version
          go version
          hugo version
          git config --global core.quotepath false

      - name: Generate navigation
        run: python ./tools/generate_mkdocs_nav.py

      - name: Prepare generated content
        run: python ./tools/prepare_generated_content.py

      - name: Build site
        run: |
          hugo \
            --gc \
            --minify \
            --contentDir generated-content \
            --baseURL "${{ secrets.SITE_BASE_URL }}" \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Apply demo redirects
        run: python ./tools/fix_demo_redirects.py

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Configure SSH
        run: |
          mkdir -p "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          ssh-keyscan -p "${SERVER_PORT}" -H "${{ secrets.SERVER_HOST }}" >> "${HOME}/.ssh/known_hosts"

      - name: Deploy public directory
        run: |
          rsync -az --delete \
            -e "ssh -p ${SERVER_PORT}" \
            public/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/"
