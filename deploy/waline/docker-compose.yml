services:
  waline:
    image: lizheming/waline:latest
    container_name: noflower-waline
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SQLITE_PATH: /app/data
    ports:
      - "127.0.0.1:${WALINE_PORT:-8360}:8360"
    volumes:
      - ./data:/app/data
