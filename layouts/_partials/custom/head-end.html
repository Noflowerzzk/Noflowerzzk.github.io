<script>
  {{- $section := "" -}}
  {{- with .Params.navPath -}}
    {{- with index . 0 -}}
      {{- $section = .title -}}
    {{- end -}}
  {{- end }}
  document.documentElement.dataset.noflowerSection = {{ $section | jsonify | safeJS }};
  document.documentElement.classList.add("noflower-js", "noflower-ui-entering");
  window.setTimeout(function () {
    document.documentElement.classList.add("noflower-ui-ready");
  }, 40);
  window.setTimeout(function () {
    document.documentElement.classList.add("noflower-ui-ready");
    document.documentElement.classList.remove("noflower-ui-entering");
  }, 520);
</script>
<script defer src="/js/content-enter.js"></script>
<script defer src="/js/page-chrome.js"></script>
<script defer src="/js/author-hovercard.js"></script>
